spring:
  application:
    name: tournament-manager
  datasource:
    url: jdbc:postgresql://localhost:5433/tournament_manager
    username: tournament_user
    password: tournament_pass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080