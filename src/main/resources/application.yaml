spring:
  application:
    name: tournament-manager
  datasource:
    url: jdbc:postgresql://localhost:5433/tournament_manager
    username: tournament_user
    password: tournament_pass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  security:
    jwt:
      # Replace with a strong, externalized secret in production (e.g. env var)
      secret: c2VjcmV0LWtleS1mb3ItdG91cm5hbWVudC1tYW5hZ2VyLWFwcGxpY2F0aW9u
      expiration: 86400000 # 24 hours in milliseconds